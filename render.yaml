services:
  - type: web
    name: hotel-damage-app
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    disk:
      name: damage-app-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/app.db
